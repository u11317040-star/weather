<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H2H Dashboard - Optimized</title>
    <style>
        :root {
            /* Hearts2Hearts 風格漸層 */
            --h2h-gradient: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 50%, #2193b0 100%);
            /* 強化後的玻璃質感：稍微加深背景色以應對淺色背景 */
            --glass: rgba(0, 0, 0, 0.25); 
            --text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background: var(--h2h-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* 增加一個暗色遮罩層，確保在淺色漸層下文字依然可讀 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.1);
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .dashboard {
            text-align: center;
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            background: var(--glass);
            padding: 50px 70px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            max-width: 700px;
            width: 85%;
        }

        #clock {
            font-size: 8.5rem;
            font-weight: 700;
            letter-spacing: -4px;
            margin: 0;
            line-height: 1;
            text-shadow: var(--text-shadow); /* 解決淺色背景看不清的問題 */
        }

        #date {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 30px;
            opacity: 0.9;
            text-shadow: var(--text-shadow);
        }

        #quote-container {
            margin: 40px 0;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        #quote {
            font-size: 1.25rem;
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 12px;
            font-weight: 300;
            text-shadow: var(--text-shadow);
        }

        #author {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.7;
        }

        .weather-box {
            margin-top: 30px;
            font-size: 1.1rem;
            font-weight: 500;
            background: rgba(255,255,255,0.15);
            padding: 12px 28px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            text-shadow: var(--text-shadow);
        }

        .weather-box:hover {
            background: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="date">...</div>
    <div id="clock">00:00</div>
    
    <div id="quote-container">
        <div id="quote">"Loading your daily inspiration..."</div>
        <div id="author">— Hearts2Hearts</div>
    </div>

    <div class="weather-box" id="weather">
        <span>正在偵測天氣...</span>
    </div>
</div>

<script>
    // 1. 大時鐘與日期更新
    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        
        document.getElementById('clock').textContent = `${hours}:${minutes}`;
        
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('date').textContent = now.toLocaleDateString('zh-TW', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. 隨機金句 API
    async function fetchQuote() {
        try {
            // 注意：若 quotable.io 暫時離線，可更換 API 來源
            const response = await fetch('https://api.quotable.io/random');
            if(!response.ok) throw new Error();
            const data = await response.json();
            document.getElementById('quote').textContent = `"${data.content}"`;
            document.getElementById('author').textContent = `— ${data.author}`;
        } catch (error) {
            document.getElementById('quote').textContent = "Everything you've ever wanted is on the other side of fear.";
            document.getElementById('author').textContent = "— George Addair";
        }
    }
    fetchQuote();

    // 3. OpenWeather API (已填入你的 Key)
    const API_KEY = 'cb9fac0c23e4b6b58989c8eeb37cc269'; 
    const CITY = 'Taipei'; 

    async function fetchWeather() {
        try {
            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&units=metric&appid=${API_KEY}`);
            const data = await response.json();
            
            if (data.cod !== 200) throw new Error();

            const temp = Math.round(data.main.temp);
            const desc = data.weather[0].description;
            
            // 根據 OpenWeather 回傳的描述做簡單翻譯或顯示
            document.getElementById('weather').innerHTML = 
                `📍 ${CITY} &nbsp; | &nbsp; ${temp}°C &nbsp; | &nbsp; ${desc.toUpperCase()}`;
        } catch (error) {
            document.getElementById('weather').textContent = "天氣暫時無法顯示";
        }
    }
    fetchWeather();
</script>

</body>
</html>
